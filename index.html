<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MigraCRM PRO</title>
<style>
:root{
  --bg:#0e1320; --bg2:#141b2d; --panel:#1a2338; --panel2:#212c46;
  --line:#2a3654; --txt:#e7ecf6; --mut:#93a1c2; --mut2:#6c7a9c;
  --gold:#d9b45b; --gold2:#f0d283; --blue:#4c8dff; --green:#37c98a;
  --red:#ff6a6a; --amber:#f5b13d; --purple:#9d7bff;
  --r:12px; --sh:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;height:100vh}
button{font-family:inherit;cursor:pointer;border:none;outline:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#2c3a5c;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}

/* ---------- Layout ---------- */
#app{display:grid;grid-template-columns:230px 1fr;height:100vh}
#side{background:linear-gradient(180deg,#121a2e,#0d1322);border-right:1px solid var(--line);display:flex;flex-direction:column}
.brand{padding:18px 16px 14px;border-bottom:1px solid var(--line);text-align:center}
.brand .logo-wrap{width:74px;height:74px;margin:0 auto 8px;display:flex;align-items:center;justify-content:center}
.brand .logo-wrap img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px}
.brand .logo-wrap svg{width:70px;height:70px}
.brand h1{font-size:19px;letter-spacing:.5px}
.brand h1 b{color:var(--gold)}
.brand span{font-size:9.5px;color:var(--mut2);letter-spacing:1.5px}
/* Membrete para impresion / PDF */
#letterhead{display:none}
.lh{display:flex;align-items:center;gap:16px;border-bottom:3px solid var(--gold);padding-bottom:14px;margin-bottom:18px}
.lh .lh-logo{width:74px;height:74px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.lh .lh-logo img{max-width:100%;max-height:100%;object-fit:contain}
.lh .lh-logo svg{width:72px;height:72px}
.lh h2{font-size:22px;margin:0;color:var(--gold)}
.lh .lh-sub{font-size:12px;color:var(--mut)}
.lh .lh-meta{margin-left:auto;text-align:right;font-size:11px;color:var(--mut)}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav button{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px;background:transparent;color:var(--mut);border-radius:10px;font-size:14px;margin-bottom:3px;transition:.15s;text-align:left}
.nav button:hover{background:var(--panel);color:var(--txt)}
.nav button.on{background:linear-gradient(90deg,rgba(217,180,91,.18),transparent);color:var(--gold2);font-weight:600}
.nav .ico{width:20px;text-align:center;font-size:16px}
.nav .badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px}
.sidefoot{padding:12px;border-top:1px solid var(--line);font-size:11px;color:var(--mut2)}
.savedot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--green);margin-right:6px;vertical-align:middle}

#main{display:flex;flex-direction:column;overflow:hidden}
#top{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);background:var(--bg2)}
#top h2{font-size:20px;font-weight:600}
#top .sub{color:var(--mut2);font-size:12px}
#top .grow{flex:1}
.search{background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:9px 12px;color:var(--txt);width:240px;font-size:13px}
#view{flex:1;overflow-y:auto;padding:22px}

/* ---------- Botones ---------- */
.btn{padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600;background:var(--panel);color:var(--txt);border:1px solid var(--line);display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn:hover{border-color:var(--gold);color:var(--gold2)}
.btn.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#241c05;border:none}
.btn.gold:hover{filter:brightness(1.08);color:#241c05}
.btn.green{background:var(--green);color:#062018;border:none}
.btn.wa{background:#25d366;color:#04240f;border:none}
.btn.red{background:transparent;border-color:#5a2b30;color:var(--red)}
.btn.sm{padding:6px 10px;font-size:12px}
.btn.ghost{background:transparent}

/* ---------- Tarjetas / KPIs ---------- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;position:relative;overflow:hidden}
.kpi .k{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:30px;font-weight:700;margin-top:6px}
.kpi .d{font-size:11px;color:var(--mut2);margin-top:2px}
.kpi::after{content:'';position:absolute;right:-20px;top:-20px;width:80px;height:80px;border-radius:50%;background:var(--accent,var(--gold));opacity:.08}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-bottom:18px}
.card h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card h3 .grow{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:1150px){.grid2{grid-template-columns:1fr}}

/* ---------- Tabla ---------- */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--mut);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
td{padding:10px 12px;border-bottom:1px solid #202a42}
tr:hover td{background:rgba(255,255,255,.02)}
.tbl-actions{display:flex;gap:6px}
.iconbtn{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:5px 8px;font-size:13px;color:var(--mut)}
.iconbtn:hover{color:var(--gold2);border-color:var(--gold)}

/* ---------- Etiquetas ---------- */
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.t-green{background:rgba(55,201,138,.15);color:var(--green)}
.t-red{background:rgba(255,106,106,.15);color:var(--red)}
.t-amber{background:rgba(245,177,61,.15);color:var(--amber)}
.t-blue{background:rgba(76,141,255,.15);color:var(--blue)}
.t-gray{background:rgba(140,155,190,.15);color:var(--mut)}
.t-purple{background:rgba(157,123,255,.15);color:var(--purple)}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px}

/* ---------- Barra de herramientas de Casos ---------- */
.toolbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.seg{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{padding:8px 15px;background:transparent;color:var(--mut);font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.seg button.on{background:var(--panel2);color:var(--gold2)}
.fchips{display:flex;gap:6px;flex-wrap:wrap}
.fchip{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;background:var(--panel);border:1px solid var(--line);color:var(--mut);cursor:pointer;transition:.12s}
.fchip:hover{color:var(--txt)}
.fchip.on{border-color:var(--gold);color:var(--gold2);background:rgba(217,180,91,.12)}
.fchip .n{opacity:.65;margin-left:5px;font-weight:700}
.estado-sel{border:1px solid var(--line);border-left-width:4px;border-radius:8px;padding:7px 9px;background:var(--panel);color:var(--txt);font-size:12px;font-weight:700;cursor:pointer;min-width:130px}
.estado-sel:hover{border-color:var(--gold)}
.pbar{height:7px;width:74px;background:#26314d;border-radius:4px;overflow:hidden;display:inline-block;vertical-align:middle}
.pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.casos-table td{padding:12px}
.casos-table tr:hover td{background:rgba(217,180,91,.04)}

/* ---------- Kanban ---------- */
.kan{display:flex;gap:14px;overflow-x:auto;padding-bottom:10px;min-height:60vh}
.col{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r);width:270px;min-width:270px;display:flex;flex-direction:column}
.col.drop{border-color:var(--gold);box-shadow:0 0 0 2px rgba(217,180,91,.25) inset}
.col-h{padding:12px 14px;border-bottom:1px solid var(--line);font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.col-h .n{margin-left:auto;background:var(--panel2);padding:1px 9px;border-radius:20px;font-size:11px;color:var(--mut)}
.col-b{padding:10px;flex:1;overflow-y:auto;min-height:80px}
.kc{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;cursor:grab;transition:.12s}
.kc:hover{border-color:var(--gold);transform:translateY(-2px)}
.kc.drag{opacity:.4}
.kc .nm{font-weight:600;font-size:13px}
.kc .ty{font-size:11px;color:var(--mut);margin:4px 0 8px}
.kc .ft{display:flex;align-items:center;gap:6px;font-size:11px}
.kc .bar{height:5px;background:#26314d;border-radius:4px;overflow:hidden;margin-top:8px}
.kc .bar i{display:block;height:100%;background:var(--gold)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(4,8,16,.72);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:100}
.overlay.on{display:flex}
.modal{background:var(--bg2);border:1px solid var(--line);border-radius:16px;width:640px;max-width:94vw;max-height:92vh;overflow-y:auto;box-shadow:var(--sh)}
.modal.wide{width:900px}
.mh{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;position:sticky;top:0;background:var(--bg2);z-index:2}
.mh h3{font-size:17px;flex:1}
.mh .x{background:var(--panel);border-radius:8px;padding:6px 11px;color:var(--mut);font-size:16px}
.mb{padding:22px}
.mf{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg2)}
.fg{margin-bottom:15px}
.fg label{display:block;font-size:12px;color:var(--mut);margin-bottom:6px;font-weight:600}
.fg input,.fg select,.fg textarea{width:100%;background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:10px 12px;color:var(--txt);font-size:14px}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--gold)}
.fg textarea{resize:vertical;min-height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* ---------- Semaforo / progreso ---------- */
.sem{display:flex;align-items:center;gap:8px}
.pill-days{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.empty{text-align:center;color:var(--mut2);padding:50px 20px}
.empty .big{font-size:44px;opacity:.5}
.hint{font-size:12px;color:var(--mut2);margin-top:4px}
.docrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #202a42}
.docrow .g{flex:1}
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px}
.chk.ok{background:var(--green);border-color:var(--green);color:#04240f}
.progress{height:8px;background:#26314d;border-radius:5px;overflow:hidden}
.progress i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2))}
.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.wa-menu{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--gold);color:var(--txt);padding:12px 22px;border-radius:10px;box-shadow:var(--sh);z-index:200;opacity:0;transition:.3s;font-size:13px}
.toast.on{opacity:1}
#upd-banner{position:fixed;top:14px;right:14px;max-width:340px;background:linear-gradient(135deg,#1a2338,#212c46);border:1px solid var(--gold);border-radius:12px;padding:14px 16px;box-shadow:var(--sh);z-index:300;display:none;font-size:13px}
#upd-banner.on{display:block}
#upd-banner b{color:var(--gold2)}
#upd-banner .row{display:flex;align-items:center;gap:10px;margin-top:10px}
#upd-banner .pbar2{flex:1;height:7px;background:#26314d;border-radius:5px;overflow:hidden}
#upd-banner .pbar2 i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0}
.mini{font-size:11px;color:var(--mut2)}
/* ---------- Pestañas del caso ---------- */
.ctabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:16px}
.ctabs button{padding:9px 13px;background:transparent;color:var(--mut);font-size:13px;font-weight:600;border-bottom:2px solid transparent;border-radius:8px 8px 0 0}
.ctabs button:hover{color:var(--txt)}
.ctabs button.on{color:var(--gold2);border-bottom-color:var(--gold)}
/* Medidor de elegibilidad */
.gauge{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.ring{position:relative;width:130px;height:130px;flex:0 0 auto}
.ring svg{transform:rotate(-90deg)}
.ring .rt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring .rt b{font-size:30px;line-height:1}
.ring .rt span{font-size:11px;color:var(--mut)}
.eq{margin-bottom:14px}
.eq label{display:block;font-size:13px;font-weight:600;margin-bottom:6px}
.eq .opts{display:flex;gap:8px;flex-wrap:wrap}
.eq .opts button{padding:7px 12px;border-radius:8px;background:var(--panel);border:1px solid var(--line);color:var(--mut);font-size:12px;font-weight:600}
.eq .opts button.on{border-color:var(--gold);color:var(--gold2);background:rgba(217,180,91,.12)}
.weak{background:rgba(255,106,106,.08);border:1px solid #5a2b30;border-radius:9px;padding:10px 12px;margin-top:4px}
.weak li{margin-left:16px;font-size:13px;margin-bottom:4px;color:#ffb0b0}
/* Línea de tiempo */
.tl{position:relative;padding-left:26px;margin-top:8px}
.tl::before{content:'';position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:var(--line)}
.tl .step{position:relative;padding:0 0 20px 8px}
.tl .step::before{content:'';position:absolute;left:-21px;top:2px;width:16px;height:16px;border-radius:50%;background:var(--panel);border:3px solid var(--gold)}
.tl .step.done::before{background:var(--green);border-color:var(--green)}
.tl .step.now::before{background:var(--gold);box-shadow:0 0 0 4px rgba(217,180,91,.25)}
.tl .step b{font-size:14px}
.tl .step .d{font-size:12px;color:var(--mut)}
/* Bitácora */
.log-item{border-left:3px solid var(--gold);background:var(--panel);border-radius:0 9px 9px 0;padding:9px 12px;margin-bottom:8px}
.log-item .t{font-size:11px;color:var(--mut2)}
.letter-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;text-align:left;padding:13px 15px}
.letter-btn small{font-weight:400;color:var(--mut);font-size:11px}
/* Documento imprimible */
#printdoc{display:none}
.doc-sheet{font-family:'Georgia',serif;color:#111;max-width:800px;margin:0 auto;padding:30px 40px;line-height:1.6}
.doc-sheet .dh{display:flex;align-items:center;gap:16px;border-bottom:3px solid #16365c;padding-bottom:12px;margin-bottom:22px}
.doc-sheet .dh .dl{width:72px;height:72px;flex:0 0 auto}
.doc-sheet .dh .dl img{max-width:100%;max-height:100%;object-fit:contain}
.doc-sheet .dh .dl svg{width:70px;height:70px}
.doc-sheet .dh h1{font-size:22px;margin:0;color:#16365c;font-family:'Segoe UI',sans-serif}
.doc-sheet .dh .ds{font-size:12px;color:#555}
.doc-sheet h2{font-size:16px;color:#16365c;margin:18px 0 8px}
.doc-sheet .sign{margin-top:60px}
.doc-sheet .sign .line{border-top:1px solid #333;width:260px;padding-top:5px;font-size:13px}
.doc-sheet table{width:100%;border-collapse:collapse;font-family:'Segoe UI',sans-serif;font-size:13px}
.doc-sheet td,.doc-sheet th{border:1px solid #ccc;padding:7px 9px;text-align:left;color:#111}
.doc-sheet .imgdoc{max-width:100%;border:1px solid #ccc;margin:8px 0;page-break-inside:avoid}
.doc-sheet .pagebreak{page-break-before:always}

@media print{ #side,#top,.mf,.noprint{display:none!important} #app{display:block} #view{overflow:visible;padding:0} body{background:#fff;color:#000} .card{border:1px solid #ccc}
  #letterhead{display:block!important;padding:16px} .lh h2{color:#16365c} .lh .lh-sub,.lh .lh-meta{color:#444} .lh{border-color:#16365c}
  /* Modo documento: solo #printdoc */
  body.printdoc-mode #app, body.printdoc-mode #letterhead, body.printdoc-mode #upd-banner, body.printdoc-mode .toast, body.printdoc-mode .overlay{display:none!important}
  body.printdoc-mode #printdoc{display:block!important} }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <aside id="side">
    <div class="brand">
      <div class="logo-wrap" id="brandLogoWrap"></div>
      <h1>M.G.L.<b>&amp;M</b></h1>
      <span>MG LEGAL &amp; MIGRATION</span>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidefoot">
      <div><span class="savedot" id="savedot"></span><span id="savetxt">Guardado</span></div>
      <div style="margin-top:6px" id="footinfo"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div id="main">
    <header id="top">
      <div>
        <h2 id="ttl">Panel</h2>
        <div class="sub" id="tsub"></div>
      </div>
      <div class="grow"></div>
      <input class="search" id="search" placeholder="🔎 Buscar cliente, caso, expediente…">
      <button class="btn gold" id="topAdd">+ Nuevo</button>
    </header>
    <div id="letterhead"></div>
    <div id="view"></div>
  </div>
</div>

<div class="overlay" id="ov"><div class="modal" id="mod"></div></div>
<div class="toast" id="toast"></div>
<div id="upd-banner"></div>
<div id="printdoc"></div>

<script>
// ============================================================================
//  MigraCRM PRO — Lógica de la aplicación
// ============================================================================
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const $ = s => document.querySelector(s);
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Respaldo: si se abre fuera de Electron (navegador), usar localStorage para no quedar inutilizable.
if (!window.api) {
  window.api = {
    loadDB:      () => localStorage.getItem('migracrm') ,
    saveDB:      (c) => { localStorage.setItem('migracrm', c); return { ok:true }; },
    attachFile:  () => { alert('Adjuntar archivos solo está disponible en la app de escritorio.'); return null; },
    openFile:    () => {},
    fileDataUrl: () => null,
    sendWhatsApp:(phone, text) => window.open('https://wa.me/' + String(phone||'').replace(/[^\d]/g,'') + '?text=' + encodeURIComponent(text||''), '_blank'),
    exportSave:  (name, content) => { const b=new Blob([content],{type:'text/plain'}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=name; a.click(); return name; },
    openBackups: () => alert('La carpeta de respaldos está disponible en la app de escritorio.'),
    paths:       () => ({ data:'(navegador)', backups:'(navegador)', adjuntos:'(navegador)' }),
    version:     () => '1.2.0',
    onUpdateStatus: () => {},
    updateInstall:  () => {},
    updateCheck:    () => {}
  };
}

// -------- Catálogo de trámites + checklist dinámico --------
const TRAMITES = {
  'Visa de Turismo':        ['Pasaporte vigente','Foto tamaño visa','Formulario de solicitud','Estados de cuenta (3 meses)','Carta de trabajo','Reserva de vuelo/hotel','Carta de invitación'],
  'Visa de Trabajo':        ['Pasaporte vigente','Foto tamaño visa','Oferta/Contrato de trabajo','Petición del empleador','Título / certificaciones','Antecedentes penales','Examen médico','Comprobante de tasas'],
  'Visa de Estudiante':     ['Pasaporte vigente','Foto tamaño visa','Carta de aceptación','Comprobante de pago de matrícula','Prueba de fondos','Antecedentes penales','Seguro médico'],
  'Residencia':             ['Pasaporte vigente','Acta de nacimiento apostillada','Antecedentes penales apostillados','Examen médico','Prueba de sustento económico','Fotos','Formulario oficial','Comprobante de tasas'],
  'Reunificación Familiar': ['Pasaporte del solicitante','Documento del familiar patrocinador','Acta de matrimonio/nacimiento','Prueba de vínculo','Prueba de ingresos del patrocinador','Fotos','Formulario oficial'],
  'Ciudadanía / Naturalización':['Tarjeta de residencia','Pasaporte','Prueba de tiempo de residencia','Antecedentes penales','Examen cívico/idioma','Fotos','Comprobante de tasas'],

// -------- helpers de fecha --------
function addDaysISO(iso,n){ const d=new Date((iso||today())+'T00:00:00'); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
function addMonthsISO(iso,m){ const d=new Date((iso||today())+'T00:00:00'); d.setMonth(d.getMonth()+m); return d.toISOString().slice(0,10); }
function fechaLarga(iso){ const M=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre']; const d=iso?new Date(iso+'T00:00:00'):new Date(); return d.getDate()+' de '+M[d.getMonth()]+' de '+d.getFullYear(); }

// -------- Elegibilidad --------
function eligResult(c){
  const ans=(c.elegibilidad&&c.elegibilidad.answers)||{};
  let sum=0,sw=0,weak=[];
  ELIG_QUESTIONS.forEach(q=>{ const idx=ans[q.id]; if(idx===undefined)return; const sc=q.opts[idx][1]; sum+=sc*q.w; sw+=q.w; if(sc<60)weak.push(q.tip); });
  return { score: sw?Math.round(sum/sw):0, weak, answered: sw>0 };
}
function ringSVG(pct){
  const r=54,c=2*Math.PI*r,off=c*(1-pct/100), col=pct>=75?'#37c98a':pct>=50?'#f5b13d':'#ff6a6a';
  return `<div class="ring"><svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="#26314d" stroke-width="12"/>
    <circle cx="65" cy="65" r="${r}" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/>
  </svg><div class="rt"><b style="color:${col}">${pct}%</b><span>éxito</span></div></div>`;
}
function setElig(casoId,qid,idx){
  const c=DB.casos.find(x=>x.id===casoId); if(!c.elegibilidad)c.elegibilidad={answers:{}}; if(!c.elegibilidad.answers)c.elegibilidad.answers={};
  c.elegibilidad.answers[qid]=idx;
  const r=eligResult(c); c.elegibilidad.score=r.score; c.elegibilidad.weak=r.weak; c.elegibilidad.fecha=today();
  if(!c.eligHist)c.eligHist=[]; const last=c.eligHist[c.eligHist.length-1];
  if(!last||last.score!==r.score)c.eligHist.push({fecha:today(),score:r.score});
  save(); openCasoDetail(casoId);
}

// -------- Línea de tiempo --------
function computeTimeline(c){
  const t=TIMELINE[c.tipo]||TIMELINE['Otro trámite']; const base=c.creado||today();
  const dPrep=addDaysISO(base,t.prep);
  const dCita=(c.fechaCita&&c.fechaCita!=='')?c.fechaCita:addDaysISO(base,t.prep+t.cita);
  const dRev=addDaysISO(dCita,t.revision), dRes=addDaysISO(dRev,t.resolucion);
  const steps=[{label:'Inicio del caso',date:base},{label:'Preparación de documentos',date:dPrep},{label:'Cita / entrevista',date:dCita},{label:'En revisión oficial',date:dRev},{label:'Resolución estimada',date:dRes}];
  const tt=today(); steps.forEach(s=>{ s.done=s.date<tt; s.rel=semText(daysTo(s.date)); });
  for(const s of steps){ if(!s.done){ s.now=true; break; } }
  return steps;
}

// -------- Renovaciones --------
function renewalDate(c){ const m=RENEWAL_MONTHS[c.tipo]; if(!m)return null; const base=c.cerrado||c.fechaLimite||today(); return addMonthsISO(base,m); }

  try{ appVersion = await window.api.version(); }catch(e){}
  $('#footinfo').innerHTML = 'BD local segura · v'+esc(appVersion||'')+'<br>'+esc(DB.meta.config.pais||'');

// -------- Guardado con autoguardado (debounce) --------
let saveTimer=null;
function save(){
  $('#savedot').style.background='var(--amber)'; $('#savetxt').textContent='Guardando…';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    const r = await window.api.saveDB(JSON.stringify(DB));
    if(r && r.ok){ $('#savedot').style.background='var(--green)'; $('#savetxt').textContent='Guardado'; }
    else { $('#savedot').style.background='var(--red)'; $('#savetxt').textContent='Error'; }
  },350);
}

// -------- Utilidades --------
const money = n => (DB.meta.config.moneda||'$')+' '+(Number(n)||0).toLocaleString('es-DO',{minimumFractionDigits:2,maximumFractionDigits:2});
const today = () => new Date().toISOString().slice(0,10);
function daysTo(dateStr){ if(!dateStr) return null; const d=new Date(dateStr+'T00:00:00'); const t=new Date(today()+'T00:00:00'); return Math.round((d-t)/86400000); }
function semColor(days){ if(days===null) return '--mut'; if(days<0) return '--red'; if(days<=7) return '--red'; if(days<=30) return '--amber'; return '--green'; }
function semText(days){ if(days===null) return '—'; if(days<0) return 'Vencido '+Math.abs(days)+'d'; if(days===0) return 'HOY'; return 'En '+days+'d'; }
const clienteName = id => (DB.clientes.find(c=>c.id===id)||{}).nombre || 'Sin cliente';
const clientePhone = id => (DB.clientes.find(c=>c.id===id)||{}).telefono || '';
function casoProgress(caso){ const d=caso.docs||[]; if(!d.length) return 0; return Math.round(d.filter(x=>x.estado==='Recibido'||x.estado==='Verificado').length/d.length*100); }

function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); }

function buildNav(){

function render(){
  const tab = TABS.find(t=>t.k===currentTab);
  $('#ttl').textContent = tab.t;
  const map = {dash:renderDash,casos:renderCasos,clientes:renderClientes,venc:renderVenc,record:renderRecord,fin:renderFin,leads:renderLeads,citas:renderCitas,renov:renderRenov,rep:renderRep,cfg:renderCfg};
  $('#tsub').textContent = subFor(currentTab);
  $('#view').innerHTML = map[currentTab]();
  wire();
  updateBadges();
  // botón "+ Nuevo" contextual
  const add=$('#topAdd');

  if(addMap[currentTab]){ add.style.display=''; add.onclick=addMap[currentTab]; add.textContent = currentTab==='clientes'?'+ Cliente':currentTab==='fin'?'+ Pago':currentTab==='leads'?'+ Lead':currentTab==='citas'?'+ Cita':'+ Nuevo caso'; }
  else add.style.display='none';
}
function subFor(k){
  if(k==='casos') return DB.casos.length+' casos registrados';
  if(k==='clientes') return DB.clientes.length+' clientes';
  if(k==='leads') return DB.leads.length+' prospectos';
  return DB.meta.asesor.nombre ? 'Asesor: '+DB.meta.asesor.nombre : 'Configura tu perfil en ⚙️';
}

// ---------------- DASHBOARD ----------------

    <div class="kpi" style="--accent:var(--amber)"><div class="k">Docs pendientes</div><div class="v">${docsPend}</div><div class="d">por recolectar</div></div>
    <div class="kpi" style="--accent:var(--gold)"><div class="k">Por cobrar</div><div class="v" style="font-size:23px">${money(porCobrar)}</div><div class="d">cobrado: ${money(cobrado)}</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <h3>⏰ Próximos vencimientos <span class="grow"></span><button class="btn sm ghost" onclick="currentTab='venc';buildNav();render()">Ver todos</button></h3>
      ${proximos.length? `<table><tbody>${proximos.map(v=>`<tr>
        <td><span class="dot" style="background:var(${semColor(v.days)})"></span>${esc(v.cliente)}</td>

        <td><span class="pill-days" style="background:rgba(255,255,255,.06);color:var(${semColor(v.days)})">${semText(v.days)}</span></td>
        <td class="mini">${esc(v.label)}</td>
        <td><button class="btn wa sm" onclick="waVenc('${v.casoId}','${v.kind}')">WhatsApp</button></td>
      </tr>`).join('')}</tbody></table>` : `<div class="empty"><div class="big">✓</div>Sin vencimientos próximos</div>`}
    </div>
    <div class="card">
      <h3>🗂️ Casos por tipo de trámite</h3>
      ${Object.keys(tipos).length? Object.entries(tipos).sort((a,b)=>b[1]-a[1]).map(([t,n])=>`
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>${esc(t)}</span><b>${n}</b></div>

// ---------------- CASOS (Kanban) ----------------
function estadoColor(k){ const e=ESTADOS.find(x=>x.k===k); return e?e.c:'--mut'; }
function estadoSelect(c){
  return `<select class="estado-sel" style="border-left-color:var(${estadoColor(c.estado)})"
    onclick="event.stopPropagation()" onchange="event.stopPropagation();setCasoEstado('${c.id}',this.value)">
    ${ESTADOS.map(e=>`<option ${c.estado===e.k?'selected':''}>${e.k}</option>`).join('')}</select>`;
}
function setCasoEstado(id,v){ const c=DB.casos.find(x=>x.id===id); if(!c)return; c.estado=v;
  if(v==='Aprobado'||v==='Rechazado')c.cerrado=today(); else delete c.cerrado; save();render();toast('Etapa: '+v); }
function setCasoFiltro(k){ casosFiltroEstado=k; render(); }
function setCasosView(v){ casosView=v; render(); }

function casosToolbar(list){
  const chip=(k,label,n)=>`<div class="fchip ${casosFiltroEstado===k?'on':''}" onclick="setCasoFiltro('${k}')">${label}<span class="n">${n}</span></div>`;
  const chips=[chip('','Todos',DB.casos.length)].concat(ESTADOS.map(e=>chip(e.k,e.k,DB.casos.filter(c=>c.estado===e.k).length)));
  return `<div class="toolbar">
    <div class="seg">
      <button class="${casosView==='lista'?'on':''}" onclick="setCasosView('lista')">📋 Lista</button>
      <button class="${casosView==='tablero'?'on':''}" onclick="setCasosView('tablero')">🗂️ Tablero</button>
    </div>
    <div class="fchips">${chips.join('')}</div>
  </div>`;
}

function renderCasos(){
  const q=searchQ.toLowerCase();
  let list=DB.casos.filter(c=> !q || clienteName(c.clienteId).toLowerCase().includes(q) || (c.tipo||'').toLowerCase().includes(q) || (c.expediente||'').toLowerCase().includes(q));
  if(casosFiltroEstado) list=list.filter(c=>c.estado===casosFiltroEstado);
  const bar=casosToolbar(list);
  if(!DB.casos.length) return bar+emptyState('🗂️','Sin casos','Crea tu primer caso con el botón “+ Nuevo caso”. Se generará solo el checklist de documentos.');
  return bar + (casosView==='tablero' ? boardView(list) : listView(list));
}

function listView(list){
  if(!list.length) return `<div class="card"><div class="empty"><div class="big">🔎</div>No hay casos en este filtro.</div></div>`;
  list=[...list].sort((a,b)=>{const da=a.fechaLimite||a.fechaCita||'9999',db=b.fechaLimite||b.fechaCita||'9999';return da.localeCompare(db);});
  return `<div class="card" style="padding:6px 0"><table class="casos-table"><thead><tr>
    <th style="padding-left:18px">Cliente</th><th>Trámite</th><th>Expediente</th><th>Etapa</th><th>Documentos</th><th>Próxima fecha</th><th style="text-align:right;padding-right:18px">Acciones</th>
  </tr></thead><tbody>
  ${list.map(c=>{
    const p=casoProgress(c);
    const dl = c.fechaLimite!=null&&c.fechaLimite!==''? daysTo(c.fechaLimite) : (c.fechaCita? daysTo(c.fechaCita):null);
    const lbl = c.fechaLimite? 'Límite' : (c.fechaCita?'Cita':'');
    const tel=clientePhone(c.clienteId);
    return `<tr onclick="openCasoDetail('${c.id}')" style="cursor:pointer">
      <td style="padding-left:18px"><b>${esc(clienteName(c.clienteId))}</b><br><span class="mini">${esc(c.prioridad||'Normal')} · creado ${esc(c.creado||'')}</span></td>
      <td>${esc(c.tipo)}<br><span class="mini">${esc(c.destino||'—')}</span></td>
      <td class="mini">${c.expediente?'#'+esc(c.expediente):'—'}</td>
      <td>${estadoSelect(c)}</td>
      <td><span class="pbar"><i style="width:${p}%"></i></span> <span class="mini">${p}%</span></td>
      <td>${dl!==null?`<span class="pill-days" style="background:rgba(255,255,255,.06);color:var(${semColor(dl)})">${semText(dl)}</span> <span class="mini">${lbl}</span>`:'<span class="mini">—</span>'}</td>
      <td class="tbl-actions" style="justify-content:flex-end;padding-right:18px" onclick="event.stopPropagation()">
        <button class="iconbtn" onclick="openCasoDetail('${c.id}')" title="Abrir">📂</button>
        ${tel?`<button class="iconbtn" onclick="waEstado('${c.id}')" title="WhatsApp estado">💬</button>`:''}
        <button class="iconbtn" onclick="event.stopPropagation();openCaso('${c.id}')" title="Editar">✏️</button>
      </td></tr>`;
  }).join('')}
  </tbody></table></div>`;
}

function boardView(list){
  return `<div class="kan">${ESTADOS.map(e=>{
    const items=list.filter(c=>c.estado===e.k);
    return `<div class="col" data-est="${e.k}">

function kanCard(c){

}

// ---------------- VENCIMIENTOS ----------------
function allVencimientos(){
  const out=[];
  DB.casos.forEach(c=>{
    if(c.estado==='Aprobado'||c.estado==='Rechazado') return;
    if(c.fechaCita) out.push({casoId:c.id,cliente:clienteName(c.clienteId),tipo:c.tipo,days:daysTo(c.fechaCita),label:'Cita: '+c.fechaCita,kind:'cita'});
    if(c.fechaLimite) out.push({casoId:c.id,cliente:clienteName(c.clienteId),tipo:c.tipo,days:daysTo(c.fechaLimite),label:'Límite: '+c.fechaLimite,kind:'limite'});
    (c.docs||[]).forEach(d=>{ if(d.vence) out.push({casoId:c.id,cliente:clienteName(c.clienteId),tipo:c.tipo,days:daysTo(d.vence),label:'Doc: '+d.req,kind:'doc'}); });
  });
  return out;
}
function renderVenc(){
  const list=allVencimientos().filter(v=>v.days!==null).sort((a,b)=>a.days-b.days);
  if(!list.length) return emptyState('⏰','Sin vencimientos','Cuando registres citas o fechas límite, aparecerán aquí con semáforo.');
  const rojo=list.filter(v=>v.days<=7).length, amb=list.filter(v=>v.days>7&&v.days<=30).length;
  return `<div class="kpis">
    <div class="kpi" style="--accent:var(--red)"><div class="k">🔴 Urgentes (≤7d)</div><div class="v">${rojo}</div></div>
    <div class="kpi" style="--accent:var(--amber)"><div class="k">🟡 Próximos (≤30d)</div><div class="v">${amb}</div></div>
    <div class="kpi" style="--accent:var(--green)"><div class="k">🟢 Total activos</div><div class="v">${list.length}</div></div>
  </div>
  <div class="card"><table><thead><tr><th>Estado</th><th>Cliente</th><th>Trámite</th><th>Detalle</th><th>Cuándo</th><th>Acciones</th></tr></thead><tbody>
  ${list.map(v=>`<tr>
    <td><span class="dot" style="background:var(${semColor(v.days)})"></span></td>
    <td><b>${esc(v.cliente)}</b></td><td class="mini">${esc(v.tipo)}</td><td>${esc(v.label)}</td>
    <td><span class="pill-days" style="background:rgba(255,255,255,.06);color:var(${semColor(v.days)})">${semText(v.days)}</span></td>
    <td class="tbl-actions">
      <button class="iconbtn" onclick="openCasoDetail('${v.casoId}')">Ver</button>
      <button class="btn wa sm" onclick="waVenc('${v.casoId}','${v.kind}')">WhatsApp</button>

// Lector de pasaporte (zona MRZ, formato TD3 de 2 líneas)
function parseMRZ(raw){
  const lines=String(raw||'').toUpperCase().replace(/[^A-Z0-9<\n]/g,'').split(/\n+/).map(s=>s.trim()).filter(Boolean);
  let l1,l2;
  for(let i=0;i<lines.length;i++){ if(lines[i][0]==='P'&&lines[i].includes('<')&&lines[i+1]){ l1=lines[i]; l2=lines[i+1]; break; } }
  if((!l1||!l2)&&lines.length>=2){ l1=lines[lines.length-2]; l2=lines[lines.length-1]; }
  if(!l1||!l2)return null;
  const clean=s=>(s||'').replace(/</g,' ').replace(/\s+/g,' ').trim();
  const namePart=l1.slice(5); const parts=namePart.split('<<');
  const nombre=(clean(parts[1])+' '+clean(parts[0])).trim();
  const documento=l2.slice(0,9).replace(/</g,'');
  const nac=l2.slice(10,13).replace(/</g,'');
  const fmt=(y,exp)=>{ if(!/^\d{6}$/.test(y))return ''; const yy=+y.slice(0,2); const year=exp?2000+yy:(yy>30?1900+yy:2000+yy); return year+'-'+y.slice(2,4)+'-'+y.slice(4,6); };
  return {nombre,documento,nacionalidad:nac,nacimiento:fmt(l2.slice(13,19),false),expira:fmt(l2.slice(21,27),true)};
}
function scanMRZ(){
  const raw=prompt('Pega las 2 líneas de códigos (MRZ) del pasaporte:\n(la zona con < < < al final de la página de datos)');
  if(!raw)return; const m=parseMRZ(raw);
  if(!m||!m.documento){ toast('No pude leer el MRZ. Copia las 2 líneas completas.'); return; }
  if($('#clNombre')&&m.nombre)$('#clNombre').value=m.nombre;
  if($('#clDoc'))$('#clDoc').value=m.documento;
  if($('#clPais')&&m.nacionalidad)$('#clPais').value=m.nacionalidad;
  const extra=`Pasaporte ${m.documento}${m.nacimiento?' · Nac: '+m.nacimiento:''}${m.expira?' · Vence: '+m.expira:''}`;
  if($('#clNota'))$('#clNota').value=($('#clNota').value?$('#clNota').value+'\n':'')+extra;
  toast('Datos del pasaporte cargados ✓');
}

function docRow(casoId,i,d){

    <button class="iconbtn" onclick="docVence('${casoId}',${i})" title="Fecha de vencimiento">📅</button>

function toggleDoc(casoId,i){const c=DB.casos.find(x=>x.id===casoId);const d=c.docs[i];d.estado=(d.estado==='Recibido'||d.estado==='Verificado')?'Pendiente':'Recibido';save();openCasoDetail(casoId);}

function docVence(casoId,i){const c=DB.casos.find(x=>x.id===casoId);const v=prompt('Fecha de vencimiento del documento (AAAA-MM-DD):',c.docs[i].vence||'');if(v!==null){c.docs[i].vence=v.trim();save();openCasoDetail(casoId);}}

function waEstado(casoId){

function waDocsPend(casoId){

}
function waVenc(casoId,kind){

}
function waCita(id){
  const c=DB.citas.find(x=>x.id===id);const tel=clientePhone(c.clienteId);if(!tel)return toast('Sin teléfono');

}

async function exportCSV(kind){
  let rows,name;
  if(kind==='clientes'){rows=[['Nombre','Teléfono','Correo','País','Documento']];DB.clientes.forEach(c=>rows.push([c.nombre,c.telefono,c.correo,c.pais,c.documento]));name='clientes.csv';}
  else if(kind==='casos'){rows=[['Cliente','Trámite','Destino','Estado','Expediente','Cita','Límite','% Docs']];DB.casos.forEach(c=>rows.push([clienteName(c.clienteId),c.tipo,c.destino,c.estado,c.expediente,c.fechaCita,c.fechaLimite,casoProgress(c)+'%']));name='casos.csv';}
  else if(kind==='pagos'){rows=[['Fecha','Cliente','Concepto','Tipo','Monto','Estado']];DB.pagos.forEach(p=>{const c=DB.casos.find(x=>x.id===p.casoId)||{};rows.push([p.fecha,clienteName(c.clienteId),p.concepto,p.tipo,p.monto,p.estado]);});name='pagos.csv';}
  else {rows=[['Nombre','Teléfono','Fuente','Interés','Estado']];DB.leads.forEach(l=>rows.push([l.nombre,l.telefono,l.fuente,l.interes,l.estado]));name='leads.csv';}
  const a=DB.meta.asesor;
  const head=[[a.oficina||'MG Legal & Migration'],['Asesoría legal y migratoria'+(a.telefono?' · Tel: '+a.telefono:'')+(a.correo?' · '+a.correo:'')],['Reporte: '+kind+'  —  '+new Date().toLocaleString('es-DO')],[]];
  const r=await window.api.exportSave(name,toCSV(head)+'\n'+toCSV(rows));
  if(r)toast('Exportado ✓');
}

// -------- Actualización automática (banner) --------
function setupUpdates(){
  try{
    window.api.onUpdateStatus((d)=>{
      const b=$('#upd-banner'); if(!b||!d)return;
      updState={status:d.status,version:(d.info&&d.info.version)||updState.version};
      if(d.status!=='progress' && currentTab==='cfg') render(); // refrescar tarjeta de Config
      if(d.status==='available'){
        b.className='on'; b.innerHTML=`<b>⬇️ Actualización disponible</b><div class="hint" style="margin-top:4px">Descargando la versión ${esc((d.info&&d.info.version)||'')}…</div>
        <div class="row"><div class="pbar2"><i id="updP"></i></div></div>`;
      } else if(d.status==='progress'){
        b.className='on'; const i=$('#updP'); if(i)i.style.width=((d.info&&d.info.percent)||0)+'%';
      } else if(d.status==='ready'){
        updVersion=(d.info&&d.info.version)||''; updReadyBanner();
      }
    });
  }catch(e){}
}
let updVersion=''; let updTimer=null;
function updReadyBanner(){
  const b=$('#upd-banner'); if(!b)return; b.className='on';
  b.innerHTML=`<b>✅ Actualización lista</b>
    <div class="hint" style="margin-top:4px">Versión ${esc(updVersion)}. ¿Cuándo deseas instalarla?</div>
    <div class="row"><button class="btn gold sm" onclick="window.api.updateInstall()">⚡ Instalar ahora</button>
      <button class="btn sm" onclick="updShowSchedule()">🕒 Programar hora</button></div>
    <div id="updSched" style="display:none;margin-top:10px">
      <label class="hint" style="display:block;margin-bottom:5px">Elige la hora de instalación:</label>
      <div class="row" style="margin-top:0">
        <input id="updTime" type="time" style="background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:7px 9px;color:var(--txt);font-size:13px">
        <button class="btn gold sm" onclick="updSchedule()">Confirmar</button>
      </div>
      <div class="row"><button class="btn ghost sm" onclick="updInstallOnClose()">O instalar al cerrar la app</button></div>
    </div>
    <div style="text-align:right;margin-top:6px"><span class="mini" style="cursor:pointer" onclick="document.getElementById('upd-banner').className=''">Ocultar por ahora ✕</span></div>`;
}
function updShowSchedule(){ const s=$('#updSched'); if(s)s.style.display=s.style.display==='none'?'block':'none'; }
function updSchedule(){
  const t=$('#updTime')&&$('#updTime').value; if(!t)return toast('Elige una hora');
  const [hh,mm]=t.split(':').map(Number);
  const now=new Date(), target=new Date(); target.setHours(hh,mm,0,0);
  if(target<=now) target.setDate(target.getDate()+1); // si ya pasó, mañana
  clearTimeout(updTimer);
  updTimer=setTimeout(()=>{ try{ window.api.updateInstall(); }catch(e){} }, target-now);
  const mañana = target.getDate()!==now.getDate();
  const b=$('#upd-banner');
  b.innerHTML=`<b>🕒 Instalación programada</b>
    <div class="hint" style="margin-top:4px">Se instalará a las <b>${t}</b>${mañana?' (mañana)':''}. Si cierras la app antes, se instala al cerrar.</div>
    <div class="row"><button class="btn gold sm" onclick="window.api.updateInstall()">⚡ Instalar ahora</button>
      <button class="btn ghost sm" onclick="updReadyBanner()">Cambiar</button></div>`;
  toast('Actualización programada para las '+t);
}
function updInstallOnClose(){
  const b=$('#upd-banner');
  b.innerHTML=`<b>✅ Se instalará al cerrar</b>
    <div class="hint" style="margin-top:4px">La actualización se aplicará sola la próxima vez que cierres MigraCRM.</div>
    <div class="row"><button class="btn gold sm" onclick="window.api.updateInstall()">⚡ Instalar ahora</button>
      <button class="btn ghost sm" onclick="document.getElementById('upd-banner').className=''">Entendido</button></div>`;
  toast('Se instalará al cerrar la app');
}
// Estado de actualización mostrado en Configuración
function updStateText(){
  if(updState.status==='ready')     return '✅ Actualización '+esc(updState.version||'')+' descargada y lista para instalar.';
  if(updState.status==='available') return '⬇️ Descargando la actualización '+esc(updState.version||'')+'…';
  if(updState.status==='progress')  return '⬇️ Descargando actualización…';
  if(updState.status==='checking')  return '🔍 Buscando actualizaciones…';
  if(updState.status==='none')      return '✔️ Estás en la última versión.';
  if(updState.status==='error')     return '⚠️ No se pudo verificar (revisa tu conexión a internet).';
  return 'Se revisa automáticamente al abrir la app y cada 3 horas.';
}
function checkUpdates(){ try{ window.api.updateCheck(); }catch(e){} updState.status='checking'; if(currentTab==='cfg')render(); toast('Buscando actualizaciones…'); }
function installUpdateNow(){
  if(updState.status==='ready'){ window.api.updateInstall(); }
  else { toast('Aún no hay una actualización descargada. Pulsa “Buscar actualizaciones”.'); }
}
setupUpdates();
boot();
